      html {

	  }

		animation-name: flowout;

      }

	  }

		color: #b6feff;
		text-shadow: 0px 0px 5px;
	  }

		text-decoration: none;
		transition: 0.1s ease-in;
      }
      @keyframes flowout {
		0% { width: 85%; }
		100% { width: 50%; }
      }
      @keyframes imgpopin {
		0% {
			width: 350px;
			height: 350px;
